<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Surname Flow · Family Tree</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root{
  --bg:#0b0908; --surface:#13110f; --border:#2a2520;
  --gold:#c8a245; --parch:#e4dbc6; --dim:#8a7d65;
  --row:18px; --label-w:170px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--parch);font:13px/1.4 Georgia,serif;overflow-x:hidden}
a{color:var(--gold);text-decoration:none}
a:hover{text-decoration:underline}

.site-header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:1.4rem 2rem 1.2rem;position:sticky;top:0;z-index:20;
}
.site-header nav{display:flex;gap:1.5rem;margin-bottom:.6rem;
  font:400 11px/1 ui-sans-serif,system-ui,sans-serif;
  text-transform:uppercase;letter-spacing:.08em}
.site-header nav a{color:var(--dim)}
.site-header h1{font-size:1.35rem;color:var(--gold);letter-spacing:.04em}
.site-header p{color:var(--dim);font-size:.82rem;margin-top:.25rem}

/* Controls */
.controls{
  display:flex;gap:1rem;align-items:center;flex-wrap:wrap;
  padding:.9rem 2rem;background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky;top:72px;z-index:19;
}
.search-wrap{position:relative;flex:1;min-width:160px;max-width:260px}
.search-wrap input{
  width:100%;background:#1a1510;border:1px solid var(--border);
  color:var(--parch);padding:.38rem .6rem .38rem 1.8rem;
  border-radius:4px;font:13px Georgia,serif;outline:none;
}
.search-wrap input:focus{border-color:rgba(200,162,69,.4)}
.search-icon{position:absolute;left:.5rem;top:50%;transform:translateY(-50%);
  color:var(--dim);font-size:.85rem;pointer-events:none}
.filter-btns{display:flex;gap:.4rem;flex-wrap:wrap}
.fbtn{
  padding:.3rem .65rem;border-radius:3px;border:1px solid var(--border);
  background:transparent;color:var(--dim);cursor:pointer;
  font:500 10px/1 ui-sans-serif,system-ui,sans-serif;letter-spacing:.07em;
  text-transform:uppercase;transition:all .15s;white-space:nowrap;
}
.fbtn:hover,.fbtn.active{border-color:currentColor;color:var(--parch)}
.fbtn.active{background:rgba(255,255,255,.05)}
.count-badge{color:var(--dim);font-size:.75rem;font-family:ui-sans-serif,system-ui,sans-serif;margin-left:auto}

/* Legend row */
.legend{
  display:flex;gap:.6rem 1.2rem;flex-wrap:wrap;
  padding:.7rem 2rem;border-bottom:1px solid var(--border);
  background:rgba(13,11,9,.9);
}
.leg-item{display:flex;align-items:center;gap:.35rem;
  font:400 11px/1 ui-sans-serif,system-ui,sans-serif;color:var(--dim)}
.leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* Chart area */
.chart-scroll{overflow-y:auto;overflow-x:hidden}
#chart-container{position:relative;padding:0 2rem 3rem}

/* Axis */
.axis-svg{display:block;position:sticky;top:0;z-index:15;
  background:var(--bg);border-bottom:1px solid rgba(200,162,69,.08)}
.axis text{fill:var(--dim);font-size:10px;font-family:ui-sans-serif,system-ui,sans-serif}
.axis line,.axis path{stroke:var(--border)}

/* Rows */
.row-svg{display:block;overflow:visible}
.sn-label{
  text-anchor:end;font-size:11px;fill:var(--dim);
  font-family:ui-sans-serif,system-ui,sans-serif;cursor:pointer;
  transition:fill .1s;
}
.sn-label:hover,.sn-label.lit{fill:var(--parch)}
.span-line{opacity:.3}
.seg-rect{cursor:pointer;transition:opacity .1s}
.seg-rect:hover{opacity:1 !important}

/* Era separators */
.era-label{font-size:9px;fill:rgba(200,162,69,.25);
  font-family:ui-sans-serif,system-ui,sans-serif;letter-spacing:.1em;text-transform:uppercase}

/* Tooltip */
#tooltip{
  position:fixed;pointer-events:none;opacity:0;
  background:#1a1510;border:1px solid var(--border);border-radius:5px;
  padding:.7rem .9rem;font-size:.78rem;line-height:1.6;
  max-width:230px;z-index:100;transition:opacity .1s;
  font-family:ui-sans-serif,system-ui,sans-serif;
}
#tooltip strong{color:var(--gold);display:block;margin-bottom:.25rem;font-size:.88rem}
#tooltip .tp-sub{color:var(--dim);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em}
#tooltip .tp-names{color:#c4b89a;margin-top:.35rem;font-size:.76rem;line-height:1.55}

/* Empty state */
.empty{color:var(--dim);font:400 13px ui-sans-serif,system-ui,sans-serif;
  padding:2rem;text-align:center}
</style>
</head>

<header class="site-header">

</div>

<div id="chart-container">

</div>

 Villanueva"}]}, {"period": 1900, "count": 1, "ancestors": [{"id": 3, "name": "Maria Hernandez Villanueva"}]}]}, {"surname": "Jasso", "total": 4, "first": 1850, "last": 1950, "region": "colonial", "periods": [{"period": 1850, "count": 1, "ancestors": [{"id": 3382, "name": "Lazaro Jasso"}]}, {"period": 1900, "count": 1, "ancestors": [{"id": 2, "name": "Jose R Jasso"}]}, {"period": 1950, "count": 2, "ancestors": [{"id": 0, "name": "Antonio Jasso"}, {"id": 1, "name": "David Villanueva Jasso"}]}]}];
const REGION_COLORS   = {"patronymic": "#c8a245", "iberian": "#e8905a", "portuguese": "#50b888", "frankish": "#6098c8", "germanic": "#9070c8", "colonial": "#d4607a", "other": "#8a7d65"};
const BUCKETS         = [650, 700, 750, 800, 850, 900, 950, 1000, 1050, 1100, 1150, 1200, 1250, 1300, 1350, 1400, 1450, 1500, 1550, 1600, 1650, 1700, 1750, 1800, 1850, 1900, 1950];
const MAX_COUNT       = 8;

// ── Dimensions ────────────────────────────────────────────────────────────────
const LABEL_W = 170;
const ROW_H   = 20;
const ROW_PAD = 3;
const SEG_MAX_H = ROW_H - ROW_PAD * 2;

let containerW = document.body.clientWidth - 64;  // 2rem each side
const MARGIN_TOP  = 32;
const MARGIN_BOT  = 16;
const AXIS_H      = 36;

function innerW(){ return containerW - LABEL_W - 20; }

let xScale;
function buildXScale(){
  xScale = d3.scaleLinear()
    .domain([BUCKETS[0], BUCKETS[BUCKETS.length-1]+50])
    .range([0, innerW()]);
}
buildXScale();

// ── State ─────────────────────────────────────────────────────────────────────
let activeRegion = 'all';
let searchStr    = '';
let visibleData  = [];

function getColor(region){ return REGION_COLORS[region] || REGION_COLORS.other; }

function filterData(){
  visibleData = ALL_SURNAMES.filter(d => {
    if(activeRegion !== 'all' && d.region !== activeRegion) return false;
    if(searchStr && !d.surname.toLowerCase().includes(searchStr.toLowerCase())) return false;
    return true;
  });
  document.getElementById('count-badge').textContent = visibleData.length + ' surnames';
}

// ── Axis ──────────────────────────────────────────────────────────────────────
const axSvg = d3.select('#axis-svg');

function drawAxis(){
  const W = LABEL_W + innerW() + 20;
  axSvg.attr('width', W).attr('height', AXIS_H);
  axSvg.selectAll('*').remove();
  const g = axSvg.append('g').attr('transform',`translate(${LABEL_W + 10}, ${AXIS_H - 18})`);
  const tickVals = BUCKETS.filter((_,i)=>i%2===0);
  const ax = d3.axisBottom(xScale).tickValues(tickVals)
    .tickFormat(d => d < 1000 ? d+' AD' : String(d))
    .tickSize(4);
  g.call(ax);
  g.select('.domain').remove();
  g.selectAll('line').attr('stroke','rgba(200,162,69,.2)');
  g.selectAll('text').attr('fill','var(--dim)').attr('font-size','10px')
    .attr('font-family','ui-sans-serif,system-ui,sans-serif');
  // vertical grid lines down into chart
  g.selectAll('.grid-line').data(tickVals).join('line')
    .attr('class','grid-line')
    .attr('x1', d=>xScale(d)).attr('x2', d=>xScale(d))
    .attr('y1', 4).attr('y2', 8)
    .attr('stroke','rgba(200,162,69,.12)');
}

// ── Rows ──────────────────────────────────────────────────────────────────────
const rowsSvg = d3.select('#rows-svg');
const tooltip = document.getElementById('tooltip');

function drawRows(){
  const n = visibleData.length;
  const H = n * ROW_H + MARGIN_TOP + MARGIN_BOT;
  const W = LABEL_W + innerW() + 20;
  rowsSvg.attr('width', W).attr('height', H);
  rowsSvg.selectAll('*').remove();

  if(n === 0){
    rowsSvg.append('text').attr('x', W/2).attr('y', 60)
      .attr('text-anchor','middle').attr('fill','var(--dim)')
      .attr('font-family','ui-sans-serif,system-ui,sans-serif').attr('font-size',13)
      .text('No surnames match.');
    return;
  }

  const g = rowsSvg.append('g').attr('transform',`translate(0,${MARGIN_TOP})`);

  // Era bands (subtle bg tint every ~400 years)
  const eras = [
    {start:650,  end:1000, label:'Early Medieval'},
    {start:1000, end:1300, label:'High Medieval'},
    {start:1300, end:1550, label:'Late Medieval'},
    {start:1550, end:1950, label:'Colonial & Modern'},
  ];
  eras.forEach(era=>{
    const x1 = xScale(era.start);
    const x2 = xScale(Math.min(era.end, BUCKETS[BUCKETS.length-1]+50));
    g.append('rect')
      .attr('x', LABEL_W + 10 + x1).attr('y', -MARGIN_TOP + 4)
      .attr('width', x2-x1).attr('height', H - MARGIN_BOT + MARGIN_TOP - 4)
      .attr('fill','rgba(200,162,69,.012)');
    g.append('text').attr('class','era-label')
      .attr('x', LABEL_W + 10 + x1 + 4).attr('y', -MARGIN_TOP + 14)
      .text(era.label);
  });

  // Rows
  visibleData.forEach((d, i) => {
    const y = i * ROW_H;
    const color = getColor(d.region);
    const rg = g.append('g').attr('transform',`translate(0,${y})`);

    // Label
    rg.append('text').attr('class','sn-label')
      .attr('x', LABEL_W + 2).attr('y', ROW_H/2 + 4)
      .attr('text-anchor','end').attr('fill', color).attr('opacity',.75)
      .attr('font-size',10).attr('font-family','ui-sans-serif,system-ui,sans-serif')
      .text(d.surname)
      .on('mouseover', function(){ d3.select(this).attr('opacity',1); })
      .on('mouseout',  function(){ d3.select(this).attr('opacity',.75); });

    // Span connector line
    if(d.periods.length > 1){
      const x1 = xScale(d.first + 25);
      const x2 = xScale(d.last  + 25);
      rg.append('line').attr('class','span-line')
        .attr('x1', LABEL_W + 10 + x1).attr('x2', LABEL_W + 10 + x2)
        .attr('y1', ROW_H/2).attr('y2', ROW_H/2)
        .attr('stroke', color).attr('stroke-width',1);
    }

    // Segments
    d.periods.forEach(p => {
      const cx = xScale(p.period + 25);
      const h  = Math.max(3, SEG_MAX_H * (p.count / MAX_COUNT));
      const segW = Math.max(6, xScale(p.period + 50) - xScale(p.period) - 2);

      rg.append('rect').attr('class','seg-rect')
        .attr('x', LABEL_W + 10 + cx - segW/2)
        .attr('y', ROW_H/2 - h/2)
        .attr('width',  segW)
        .attr('height', h)
        .attr('rx', 2)
        .attr('fill', color)
        .attr('opacity', 0.78)
        .on('mousemove', function(event){
          const names = p.ancestors.map(a=>a.name).join('<br>');
          tooltip.innerHTML = `<strong>${d.surname}</strong>
            <div class="tp-sub">${p.period}–${p.period+49} &nbsp;·&nbsp; ${p.count} ancestor${p.count!==1?'s':''}</div>
            ${names ? '<div class="tp-names">'+names+(p.ancestors.length===10?'<br>…':'')+'</div>' : ''}`;
          tooltip.style.opacity = '1';
          const tx = event.clientX + 14, ty = event.clientY - 10;
          tooltip.style.left = (tx + 240 > window.innerWidth ? tx - 250 : tx) + 'px';
          tooltip.style.top  = (ty + 140 > window.innerHeight ? ty - 130 : ty) + 'px';
        })
        .on('mouseleave', ()=>{ tooltip.style.opacity='0'; });
    });

    // Total count badge on far right
    const x2 = xScale(d.last + 50) + 4;
    if(x2 < innerW() - 20){
      rg.append('text')
        .attr('x', LABEL_W + 10 + x2).attr('y', ROW_H/2 + 3.5)
        .attr('fill', color).attr('opacity',.45)
        .attr('font-size', 9).attr('font-family','ui-sans-serif,system-ui,sans-serif')
        .text(d.total);
    }
  });

  // Horizontal separator every 10 rows
  for(let i=10; i<n; i+=10){
    g.append('line')
      .attr('x1',0).attr('x2',W)
      .attr('y1',i*ROW_H-.5).attr('y2',i*ROW_H-.5)
      .attr('stroke','rgba(200,162,69,.05)');
  }
}

// ── Init ──────────────���───────────────────────────────────────────────────────
filterData();
drawAxis();
drawRows();

// ── Search ───────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', function(){
  searchStr = this.value;
  filterData(); drawRows();
});

// ── Region filter buttons ─────────────────────────────────────────────────────
document.querySelectorAll('.fbtn').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    activeRegion = this.dataset.region;
    filterData(); drawRows();
  });
});

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', ()=>{
  containerW = document.body.clientWidth - 64;
  buildXScale(); drawAxis(); drawRows();
});
</script>
</body>
</html>
